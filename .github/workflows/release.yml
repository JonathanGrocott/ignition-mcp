name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      with:
        gradle-version: wrapper

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build module
      run: ./gradlew clean test zipModule checksumModl

    - name: Get version from build.gradle.kts
      id: get_version
      run: |
        VERSION=$(grep "moduleVersion = " build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Module version: $VERSION"

    - name: Find .modl file
      id: find_modl
      run: |
        MODL_FILE=$(find build -name "*.unsigned.modl" -type f | head -1)
        if [ -z "$MODL_FILE" ]; then
          echo "No .unsigned.modl file found"
          exit 1
        fi
        SHA_FILE="${MODL_FILE}.sha256"
        sha256sum "$MODL_FILE" > "$SHA_FILE"
        echo "MODL_FILE=$MODL_FILE" >> $GITHUB_ENV
        echo "SHA_FILE=$SHA_FILE" >> $GITHUB_ENV
        echo "Found module file: $MODL_FILE"
        echo "Generated checksum file: $SHA_FILE"

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'SNAPSHOT') }}
        body: |
          ## Ignition MCP Module
          Version: ${{ env.VERSION }}

          ### Installation
          1. Download the `.unsigned.modl` file below
          2. Install it in Ignition via `Config > Modules > Install or Upgrade a Module`
          3. Restart gateway if prompted

          ### Verification
          - Gateway UI page: `Services > Ignition MCP > Configuration`
          - MCP endpoint: `/data/ignition-mcp/mcp`

          ### Changes
          See commit history and PRs for full details.
        files: |
          ${{ env.MODL_FILE }}
          ${{ env.SHA_FILE }}
          build/checksum/checksum.json
